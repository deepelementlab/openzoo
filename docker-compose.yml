version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: openzoo
      POSTGRES_PASSWORD: openzoo
      POSTGRES_DB: openzoo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openzoo"]
      interval: 5s
      timeout: 5s
      retries: 5

  centrifugo:
    image: centrifugo/centrifugo:v5
    ports:
      - "8000:8000"
    volumes:
      - ./centrifugo/config.json:/etc/centrifugo/config.json
    command: centrifugo -c /etc/centrifugo/config.json
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://openzoo:openzoo@postgres:5432/openzoo?sslmode=disable
      CENTRIFUGO_API_URL: http://centrifugo:8000/api/publish
      CENTRIFUGO_API_KEY: openzoo-dev-key
      REDIS_ADDR: redis:6379
      JWT_SECRET: openzoo-jwt-secret-change-in-production
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
      centrifugo:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:

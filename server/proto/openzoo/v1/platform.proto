syntax = "proto3";

package openzoo.v1;

option go_package = "github.com/openzoo-ai/openzoo/server/gen/openzoo/v1;openzoov1";

message Empty {}

// ── Workspace ────────────────────────────────────

message Workspace {
  string id = 1;
  string name = 2;
  string slug = 3;
  string description = 4;
  string context = 5;
  string issue_prefix = 6;
  int64 created_at = 7;
  int64 updated_at = 8;
}

message WorkspaceRepo {
  string url = 1;
  string description = 2;
}

message WorkspaceWithRepos {
  Workspace workspace = 1;
  repeated WorkspaceRepo repos = 2;
}

message ListWorkspacesRequest {}
message ListWorkspacesResponse { repeated Workspace workspaces = 1; }
message GetWorkspaceRequest { string workspace_id = 1; }

message CreateWorkspaceRequest {
  string name = 1;
  string description = 2;
  string issue_prefix = 3;
}

message UpdateWorkspaceRequest {
  string workspace_id = 1;
  optional string name = 2;
  optional string description = 3;
  optional string context = 4;
}

message DeleteWorkspaceRequest { string workspace_id = 1; }

// ── Auth / User ──────────────────────────────────

message User {
  string id = 1;
  string name = 2;
  string email = 3;
  string avatar_url = 4;
  int64 created_at = 5;
  int64 updated_at = 6;
}

message SendVerificationCodeRequest { string email = 1; }
message SendVerificationCodeResponse { bool success = 1; }

message VerifyCodeRequest { string email = 1; string code = 2; }
message VerifyCodeResponse { string token = 1; User user = 2; }

message LoginWithTokenRequest { string token = 1; }
message LoginWithTokenResponse { string token = 1; User user = 2; }

message GetCurrentUserRequest {}
message GetCurrentUserResponse { User user = 1; }

message UpdateCurrentUserRequest {
  optional string name = 1;
  optional string avatar_url = 2;
}

// ── Members ──────────────────────────────────────

enum MemberRole {
  MEMBER_ROLE_UNSPECIFIED = 0;
  MEMBER_ROLE_OWNER = 1;
  MEMBER_ROLE_ADMIN = 2;
  MEMBER_ROLE_MEMBER = 3;
}

message MemberWithUser {
  string id = 1;
  string workspace_id = 2;
  string user_id = 3;
  MemberRole role = 4;
  int64 created_at = 5;
  string name = 6;
  string email = 7;
  string avatar_url = 8;
}

message ListMembersRequest { string workspace_id = 1; }
message ListMembersResponse { repeated MemberWithUser members = 1; }

message CreateMemberRequest {
  string workspace_id = 1;
  string email = 2;
  MemberRole role = 3;
}

message UpdateMemberRequest {
  string workspace_id = 1;
  string member_id = 2;
  MemberRole role = 3;
}

message DeleteMemberRequest {
  string workspace_id = 1;
  string member_id = 2;
}

// ── Personal Access Tokens ───────────────────────

message PersonalAccessToken {
  string id = 1;
  string name = 2;
  string token_prefix = 3;
  int64 expires_at = 4;
  int64 last_used_at = 5;
  int64 created_at = 6;
}

message CreatePATRequest { string name = 1; int32 expires_in_days = 2; }
message CreatePATResponse { PersonalAccessToken token_info = 1; string token = 2; }
message ListPATsRequest {}
message ListPATsResponse { repeated PersonalAccessToken tokens = 1; }
message DeletePATRequest { string token_id = 1; }

// ── Services ─────────────────────────────────────

service WorkspaceService {
  rpc ListWorkspaces(ListWorkspacesRequest) returns (ListWorkspacesResponse);
  rpc GetWorkspace(GetWorkspaceRequest) returns (WorkspaceWithRepos);
  rpc CreateWorkspace(CreateWorkspaceRequest) returns (Workspace);
  rpc UpdateWorkspace(UpdateWorkspaceRequest) returns (Workspace);
  rpc DeleteWorkspace(DeleteWorkspaceRequest) returns (Empty);
}

service AuthService {
  rpc SendVerificationCode(SendVerificationCodeRequest) returns (SendVerificationCodeResponse);
  rpc VerifyCode(VerifyCodeRequest) returns (VerifyCodeResponse);
  rpc LoginWithToken(LoginWithTokenRequest) returns (LoginWithTokenResponse);
  rpc GetCurrentUser(GetCurrentUserRequest) returns (GetCurrentUserResponse);
  rpc UpdateCurrentUser(UpdateCurrentUserRequest) returns (User);
}

service MemberService {
  rpc ListMembers(ListMembersRequest) returns (ListMembersResponse);
  rpc CreateMember(CreateMemberRequest) returns (MemberWithUser);
  rpc UpdateMember(UpdateMemberRequest) returns (MemberWithUser);
  rpc DeleteMember(DeleteMemberRequest) returns (Empty);
}

service PATService {
  rpc ListPersonalAccessTokens(ListPATsRequest) returns (ListPATsResponse);
  rpc CreatePersonalAccessToken(CreatePATRequest) returns (CreatePATResponse);
  rpc DeletePersonalAccessToken(DeletePATRequest) returns (Empty);
}
